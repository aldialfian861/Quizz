<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Special Quiz ❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #ff9ecf, #ffd6e7);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      padding:20px;
    }

    .container{
      background:white;
      width:100%;
      max-width:500px;
      padding:30px;
      border-radius:25px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      position:relative;
      z-index:2;
    }

    h1{
      color:#ff4081;
      margin-bottom:15px;
      font-size:32px;
    }

    p{
      color:#555;
      margin-bottom:18px;
      line-height:1.6;
    }

    .quiz-wrap{
      animation: fade 0.5s ease;
    }

    .quiz-question{
      font-size:22px;
      font-weight:bold;
      color:#ff4081;
      margin-bottom:10px;
    }

    input{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid #ddd;
      margin-bottom:15px;
      font-size:16px;
      text-align:center;
      outline:none;
    }

    .quiz-options{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:15px;
    }

    button{
      padding:12px 22px;
      border:none;
      border-radius:50px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
    }

    #startQuizBtn,
    #yesBtn{
      background:#ff4081;
      color:white;
    }

    #noBtn{
      background:#ddd;
      color:#333;
      position:absolute;
    }

    #closeBtn{
      margin-top:20px;
      background:#333;
      color:white;
    }

    .btn-group{
      position:relative;
      height:140px;
      margin-top:20px;
    }

    #yesBtn{
      position:absolute;
      left:70px;
      top:40px;
    }

    #noBtn{
      right:70px;
      top:40px;
    }

    .result{
      display:none;
      animation: fade 1s ease;
      margin-top:20px;
    }

    .result h2{
      color:#ff4081;
      margin:15px 0;
    }

    .heart{
      font-size:80px;
      animation: beat 1s infinite;
    }

    .quiz-feedback{
      margin-top:15px;
      color:#ff4081;
      font-weight:bold;
      min-height:24px;
    }

    .floating-heart{
      position:fixed;
      color:red;
      animation: float 4s linear infinite;
      opacity:0.7;
      pointer-events:none;
      z-index:1;
    }

    @keyframes beat{
      0%{ transform:scale(1); }
      50%{ transform:scale(1.2); }
      100%{ transform:scale(1); }
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes float{
      from{
        transform:translateY(100vh) scale(0.5);
        opacity:1;
      }
      to{
        transform:translateY(-100px) scale(1.5);
        opacity:0;
      }
    }

    @media(max-width:500px){

      h1{
        font-size:26px;
      }

      #yesBtn{
        left:20px;
      }

      #noBtn{
        right:20px;
      }

    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Special Quiz ❤️</h1>

    <!-- INPUT NAMA -->
    <div class="quiz-wrap" id="nameWrap">

      <p class="quiz-question">
        Halo cantik ✨
      </p>

      <p>
        Sebelum lanjut, isi nama kamu dulu ya 🥰
      </p>

      <input
        type="text"
        id="nameInput"
        placeholder="Masukkan nama kamu...(Misal: Gahta Cantik)"
        maxlength="25"
      >

      <button type="button" id="startQuizBtn">
        Mulai
      </button>

      <div class="quiz-feedback" id="nameFeedback"></div>

    </div>

    <!-- QUIZ -->
    <div class="quiz-wrap" id="quizWrap" style="display:none;">

      <p class="quiz-question">
        Pertanyaan dulu 😆
      </p>

      <p id="quizPrompt">
        Ibu kota Indonesia adalah...
      </p>

      <div class="quiz-options">

        <button type="button" id="optA">
          Jakarta
        </button>

        <button type="button" id="optB">
          Bandung
        </button>

      </div>

      <div class="quiz-feedback" id="quizFeedback"></div>

    </div>

    <!-- PERTANYAAN UTAMA -->
    <div id="mainSection" style="display:none;">

      <p id="question">
        Hai kamu... ❤️ <br><br>
        Mau nggak jadi orang spesial di hidup aku? 🥺
      </p>

      <div class="btn-group">

        <button type="button" id="yesBtn">
          Mau ❤️
        </button>

        <button type="button" id="noBtn">
          Nggak 😅
        </button>

      </div>

    </div>

    <!-- HASIL -->
    <div class="result" id="result">

      <div class="heart">❤️</div>

      <h2>
        YEEAAAYYY 😆
      </h2>

      <p id="resultText">
        Mulai sekarang kamu resmi jadi mood booster aku tiap hari ✨
      </p>

      <!-- BUTTON CLOSE -->
      <button type="button" id="closeBtn">
        Close ✖
      </button>

    </div>

  </div>

  <!-- AUDIO -->
  <audio id="bgMusic" loop>
    <source src="Faris Adam & Diva Aurel “Body Pata Pata”.mp3" type="audio/mp3">
  </audio>

  <script>

    // ELEMENT
    const startQuizBtn = document.getElementById("startQuizBtn");
    const nameInput = document.getElementById("nameInput");
    const nameFeedback = document.getElementById("nameFeedback");

    const nameWrap = document.getElementById("nameWrap");
    const quizWrap = document.getElementById("quizWrap");

    const optA = document.getElementById("optA");
    const optB = document.getElementById("optB");

    const quizFeedback = document.getElementById("quizFeedback");

    const mainSection = document.getElementById("mainSection");

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");

    const result = document.getElementById("result");
    const resultText = document.getElementById("resultText");

    // BUTTON CLOSE
    const closeBtn = document.getElementById("closeBtn");

    // AUDIO
    const bgMusic = document.getElementById("bgMusic");

    let userName = "";

    // TOMBOL MULAI
    startQuizBtn.addEventListener("click", function(){

      userName = nameInput.value.trim();

      if(userName === ""){

        nameFeedback.innerHTML = "Isi nama dulu dong 😅";
        return;

      }

      nameFeedback.innerHTML = "";

      initialQuizIndex = 0;
      renderInitialQuiz();

      nameWrap.style.display = "none";
      quizWrap.style.display = "block";

    });


    // --- QUIZ (Ditambahkan: 2 pertanyaan awal) ---
    const initialQuizQuestions = [
      {
        question: "Matahari terbit dari arah...",
        a: "Timur",
        b: "Hatiku",
        correct: "a",
      },
      {
        question: "Hewan tercepat di dunia adalah...",
        a: "Cheetah",
        b: "Kucing galau",
        correct: "a",
      },
    ];

    let initialQuizIndex = 0;

    function renderInitialQuiz(){
      const q = initialQuizQuestions[initialQuizIndex];
      document.getElementById("quizPrompt").innerHTML = q.question;
      optA.innerHTML = q.a;
      optB.innerHTML = q.b;
      quizFeedback.innerHTML = "";
    }

    function handleInitialAnswer(answer){
      const q = initialQuizQuestions[initialQuizIndex];

      if(answer === q.correct){
        quizFeedback.innerHTML = "Benarrr 😆";

        setTimeout(function(){
          initialQuizIndex++;

          if(initialQuizIndex >= initialQuizQuestions.length){
            quizWrap.style.display = "none";
            mainSection.style.display = "block";
          } else {
            renderInitialQuiz();
          }
        }, 1000);
      } else {
        quizFeedback.innerHTML = "Salah 😜 coba lagi";
      }
    }

    // JAWABAN BENAR/SALAH (untuk QUIZ awal)
    optA.addEventListener("click", function(){
      handleInitialAnswer("a");
    });

    optB.addEventListener("click", function(){
      handleInitialAnswer("b");
    });


    // TOMBOL NO LARI
    noBtn.addEventListener("mouseover", function(){

      const container = document.querySelector(".container");

      const maxX = container.clientWidth - noBtn.offsetWidth - 20;
      const maxY = 100;

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";

    });

    // TOMBOL YES
    yesBtn.addEventListener("click", function(){

      mainSection.style.display = "none";
      result.style.display = "block";

      resultText.innerHTML =
        userName + ", sekarang kamu resmi jadi mood booster aku tiap hari ❤️";

      // PLAY MUSIC MULAI DETIK 28
      bgMusic.currentTime = 28;
      bgMusic.play();

      createHearts();

    });

    // BUTTON CLOSE
    closeBtn.addEventListener("click", function(){

      // stop musik
      bgMusic.pause();
      bgMusic.currentTime = 0;

      // reset tampilan
      result.style.display = "none";
      mainSection.style.display = "none";
      quizWrap.style.display = "none";

      // kembali ke awal
      nameWrap.style.display = "block";

      // reset input
      nameInput.value = "";
      nameFeedback.innerHTML = "";
      quizFeedback.innerHTML = "";

      // reset quiz awal
      initialQuizIndex = 0;
      renderInitialQuiz();

    });


    // EFEK LOVE
    function createHearts(){

      setInterval(function(){

        const heart = document.createElement("div");

        heart.classList.add("floating-heart");

        heart.innerHTML = "❤️";

        heart.style.left =
          Math.random() * window.innerWidth + "px";

        heart.style.fontSize =
          (Math.random() * 20 + 20) + "px";

        document.body.appendChild(heart);

        setTimeout(function(){
          heart.remove();
        }, 4000);

      }, 300);

    }

  </script>

</body>
</html>
